<script>

var restInterval = null;
var restRemaining = 0;
var restTotal = 0;

function startRest(seconds) {
  if (restInterval) clearInterval(restInterval);
  restRemaining = seconds;
  restTotal = seconds;
  document.getElementById('rest-bar').classList.add('visible');
  updateRestDisplay();
  restInterval = setInterval(function() {
    restRemaining--;
    updateRestDisplay();
    if (restRemaining <= 0) finishRest();
  }, 1000);
}

function updateRestDisplay() {
  document.getElementById('rest-countdown').textContent = restRemaining;
  var pct = (restRemaining / restTotal) * 100;
  document.getElementById('rest-fill').style.width = pct + '%';
  document.getElementById('rest-fill').style.background = restRemaining <= 10 ? '#E24B4A' : '#9FE1CB';
}

function finishRest() {
  if (restInterval) clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-bar').classList.remove('visible');
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(function(t) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

function skipRest() {
  if (restInterval) clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-bar').classList.remove('visible');
}

var currentWeek = 1;
var currentDay = 0;
var checked = {};
try { checked = JSON.parse(localStorage.getItem('goalie_v2') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('goalie_v2', JSON.stringify(checked)); } catch(e) {}
}

function getKey() { return 'w' + currentWeek + 'd' + currentDay; }

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-tab').forEach(function(t, i) {
    t.classList.toggle('active', [1,3,5,7][i] === w);
  });
  renderDay();
}

function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === d);
  });
  renderDay();
}

function toggle(key, idx, sType) {
  var wasChecked = checked[key + '_' + idx];
  checked[key + '_' + idx] = !wasChecked;
  save();
  if (!wasChecked && sType !== 'warmup' && sType !== 'run') {
    var secs = restTimes[sType] || 60;
    startRest(secs);
  } else {
    skipRest();
  }
  renderDay();
}

function resetDay() {
  var key = getKey();
  Object.keys(checked).forEach(function(k) {
    if (k.indexOf(key) === 0) delete checked[k];
  });
  skipRest();
  save();
  renderDay();
}

function openHow(name, detail) {
  var info = howTo[name];
  if (!info) return;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-detail').textContent = detail;
  document.getElementById('modal-steps').innerHTML = info.steps.map(function(s, i) {
    return '<li><span class="num">' + (i+1) + '</span><span>' + s + '</span></li>';
  }).join('');
  var goalieEl = document.getElementById('modal-goalie');
  if (info.goalie) {
    goalieEl.style.display = 'block';
    goalieEl.innerHTML = '<strong>Goalie note:</strong> ' + info.goalie;
  } else {
    goalieEl.style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderDay() {
  var week = data[currentWeek];
  var day = week.days[currentDay];
  document.getElementById('phase-badge').textContent = week.phase;
  document.getElementById('header-sub').textContent = week.sub;

  var key = getKey();
  var all = (day.warmup || []).concat(day.main || []).concat(day.core || []);
  var total = all.length;
  var done = all.filter(function(_, i) { return checked[key + '_' + i]; }).length;
  document.getElementById('progress-text').textContent = done + ' of ' + total + ' done';
  document.getElementById('progress-fill').style.width = (total ? Math.round(done/total*100) : 0) + '%';
  document.getElementById('confetti').classList.toggle('show', done === total && total > 0);

  var html = '';
  var idx = 0;

  function section(label, exs, sType) {
    if (!exs || !exs.length) return;
    var restSec = restTimes[sType] || 0;
    var restLabel = (sType !== 'warmup' && sType !== 'run' && restSec > 0) ? (' · ' + restSec + 's rest') : '';
    html += '<div class="section-label">' + label + '<span class="section-rest">' + restLabel + '</span></div>';
    exs.forEach(function(ex) {
      var i = idx++;
      var isDone = checked[key + '_' + i];
      var name = ex[0];
      var detail = ex[1];
      var tip = ex[2];
      var hasHow = !!howTo[name];
      var safeName = name.replace(/'/g, "\\'");
      var safeDetail = detail.replace(/'/g, "\\'");
      html += '<div class="ex-card' + (isDone ? ' done' : '') + '">';
      html += '<div class="check" onclick="toggle(\'' + key + '\',' + i + ',\'' + sType + '\')"><span class="check-icon">&#10003;</span></div>';
      html += '<div class="ex-info">';
      html += '<div class="ex-name">' + name + '</div>';
      html += '<div class="ex-detail">' + detail + '</div>';
      if (tip) html += '<div class="ex-tip">' + tip + '</div>';
      html += '<div class="btn-row">';
      if (hasHow) html += '<button class="how-btn" onclick="openHow(\'' + safeName + '\',\'' + safeDetail + '\')">&#9654; how to</button>';
      if (sType !== 'warmup' && sType !== 'run' && restSec > 0) {
        html += '<button class="rest-btn" onclick="startRest(' + restSec + ')">&#9201; ' + restSec + 's rest</button>';
      }
      html += '</div></div></div>';
    });
  }

  section('warmup', day.warmup, 'warmup');
  section('main work', day.main, currentDay === 2 ? 'run' : 'main');
  section('core / cooldown', day.core, currentDay === 2 ? 'warmup' : 'core');

  document.getElementById('exercise-list').innerHTML = html;
}

renderDay();

</script>
